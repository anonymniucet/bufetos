<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Bufet</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
:root {
  --g:     #16a34a;
  --gd:    #15803d;
  --gdd:   #0d5c2e;
  --gl:    #22c55e;
  --gpal:  #f0fdf4;
  --gmid:  #bbf7d0;
  --gsof:  #dcfce7;
  --white: #fff;
  --bg:    #f8fafc;
  --text:  #0f172a;
  --sub:   #475569;
  --muted: #94a3b8;
  --line:  #e2e8f0;
  --red:   #ef4444;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { -webkit-tap-highlight-color: transparent; }
body {
  font-family: 'Outfit', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  overscroll-behavior: none;
  -webkit-font-smoothing: antialiased;
}
#gate {
  position: fixed; inset: 0; z-index: 9999;
  background: linear-gradient(160deg, #0a3d20 0%, #0d5c2e 45%, #14532d 100%);
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  padding: 24px;
  transition: opacity .5s ease;
}
#gate.out { opacity: 0; pointer-events: none; }
.gate-card { width: 100%; max-width: 360px; text-align: center; }
.gate-emblem {
  width: 80px; height: 80px; border-radius: 24px;
  background: linear-gradient(135deg, rgba(255,255,255,.18), rgba(255,255,255,.06));
  border: 1px solid rgba(255,255,255,.2);
  display: flex; align-items: center; justify-content: center;
  font-size: 2.4rem; margin: 0 auto 24px;
  box-shadow: 0 8px 32px rgba(0,0,0,.2);
}
.gate-title { font-size: 2rem; font-weight: 900; color: #fff; letter-spacing: -.5px; margin-bottom: 6px; }
.gate-sub { font-size: .92rem; color: rgba(255,255,255,.5); margin-bottom: 36px; font-weight: 400; }
.gate-field { position: relative; margin-bottom: 12px; }
.gate-field input {
  width: 100%; padding: 16px 18px;
  background: rgba(255,255,255,.1);
  border: 1.5px solid rgba(255,255,255,.18);
  border-radius: 14px; color: #fff;
  font-family: inherit; font-size: 1rem; font-weight: 600;
  outline: none; text-align: center;
  transition: border-color .2s, background .2s;
}
.gate-field input::placeholder { color: rgba(255,255,255,.3); font-weight: 400; }
.gate-field input:focus { border-color: rgba(255,255,255,.45); background: rgba(255,255,255,.16); }
.gate-field input.shake { animation: shake .35s ease; border-color: rgba(252,165,165,.7) !important; }
@keyframes shake {
  0%,100% { transform: translateX(0); }
  20% { transform: translateX(-8px); }
  40% { transform: translateX(8px); }
  60% { transform: translateX(-5px); }
  80% { transform: translateX(5px); }
}
.gate-err { font-size: .82rem; color: #fca5a5; font-weight: 600; min-height: 22px; margin-bottom: 4px; text-align: center; }
.gate-btn {
  width: 100%; padding: 16px;
  background: #fff; color: var(--gdd);
  border: none; border-radius: 14px;
  font-family: inherit; font-size: 1rem; font-weight: 800;
  cursor: pointer; transition: all .2s;

<!DOCTYPE html>

<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Bufet</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --g1: #0f6e3d;
  --g2: #18a05a;
  --g3: #d4f0e2;
  --g4: #ebf8f2;
  --white: #ffffff;
  --bg: #f2f9f5;
  --text: #0c1f14;
  --soft: #52786a;
  --border: #cce8d8;
  --red: #e03333;
  --r: 14px;
  --hh: 62px;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { -webkit-tap-highlight-color: transparent; scroll-behavior: smooth; }
body {
  font-family: 'Plus Jakarta Sans', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  overscroll-behavior: none;
}

/* HEADER */
header {
position: sticky; top: 0; z-index: 90;
height: var(–hh);
background: var(–white);
border-bottom: 1.5px solid var(–border);
box-shadow: 0 1px 12px rgba(15,110,61,.07);
}
.hdr {
height: 100%; max-width: 1080px;
margin: 0 auto; padding: 0 16px;
display: flex; align-items: center; justify-content: space-between; gap: 12px;
}
.logo {
font-family: ‘Syne’, sans-serif;
font-size: 1.45rem; font-weight: 800;
color: var(–g1); letter-spacing: -.5px;
display: flex; align-items: center; gap: 8px;
}
.logo-dot {
width: 8px; height: 8px;
background: var(–g2); border-radius: 50%; margin-top: 2px;
}
.hdr-right { display: flex; align-items: center; gap: 8px; }

.btn-cart {
display: flex; align-items: center; gap: 7px;
background: var(–g1); color: #fff;
border: none; border-radius: 50px;
padding: 9px 18px;
font-family: inherit; font-size: .9rem; font-weight: 600;
cursor: pointer; position: relative;
transition: background .2s, transform .15s;
white-space: nowrap;
}
.btn-cart:active { transform: scale(.97); }
.btn-cart:hover { background: var(–g2); }
.badge {
position: absolute; top: -5px; right: -5px;
background: var(–red); color: #fff;
font-size: .68rem; font-weight: 700;
width: 18px; height: 18px; border-radius: 50%;
display: none; align-items: center; justify-content: center;
border: 2px solid var(–white);
}
.btn-admin {
background: transparent;
border: 1.5px solid var(–border); color: var(–soft);
border-radius: 50px; padding: 8px 14px;
font-family: inherit; font-size: .82rem; font-weight: 600;
cursor: pointer; transition: all .2s; white-space: nowrap;
}
.btn-admin:hover { border-color: var(–g1); color: var(–g1); }

/* PAGES */
#shopPage { max-width: 1080px; margin: 0 auto; padding: 24px 16px 100px; }
#adminPage { max-width: 1080px; margin: 0 auto; padding: 24px 16px 80px; display: none; }

/* HERO */
.hero {
background: linear-gradient(135deg, var(–g1) 0%, #0d8f50 100%);
border-radius: 20px; padding: 28px 24px; margin-bottom: 20px;
color: #fff; position: relative; overflow: hidden;
}
.hero::before {
content: ‘’; position: absolute; top: -30px; right: -30px;
width: 160px; height: 160px;
background: rgba(255,255,255,.07); border-radius: 50%;
}
.hero::after {
content: ‘’; position: absolute; bottom: -50px; right: 40px;
width: 120px; height: 120px;
background: rgba(255,255,255,.05); border-radius: 50%;
}
.hero h1 {
font-family: ‘Syne’, sans-serif;
font-size: clamp(1.5rem, 5vw, 2rem); font-weight: 800;
margin-bottom: 6px; position: relative; z-index: 1;
}
.hero p { font-size: .9rem; opacity: .85; position: relative; z-index: 1; }

/* NOTICE */
.notice {
background: var(–white);
border: 1.5px solid var(–border);
border-left: 4px solid var(–g2);
border-radius: var(–r); padding: 12px 16px; margin-bottom: 28px;
display: flex; align-items: center; gap: 10px;
font-size: .88rem; font-weight: 600; color: var(–g1);
}
.notice-icon { font-size: 1.3rem; flex-shrink: 0; }

/* SECTION */
.sec-wrap { margin-bottom: 32px; }
.sec-label { display: flex; align-items: center; gap: 10px; margin-bottom: 14px; }
.sec-label span { font-family: ‘Syne’, sans-serif; font-size: 1rem; font-weight: 800; }
.sec-label::after { content: ‘’; flex: 1; height: 1.5px; background: var(–border); border-radius: 2px; }

/* PRODUCT GRID */
.grid {
display: grid;
grid-template-columns: repeat(2, 1fr);
gap: 12px;
}
@media (min-width: 480px) { .grid { grid-template-columns: repeat(3, 1fr); } }
@media (min-width: 700px) { .grid { grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 14px; } }

.card {
background: var(–white);
border: 1.5px solid var(–border);
border-radius: var(–r); padding: 14px 14px 12px;
display: flex; flex-direction: column; gap: 10px;
cursor: pointer;
transition: transform .2s, box-shadow .2s, border-color .2s;
-webkit-user-select: none; user-select: none;
position: relative;
}
.card:hover { transform: translateY(-2px); box-shadow: 0 6px 24px rgba(15,110,61,.10); border-color: var(–g2); }
.card:active { transform: scale(.98); }

.card-top { display: flex; align-items: flex-start; justify-content: space-between; }
.card-emoji { font-size: 1.9rem; line-height: 1; }
.card-tag {
background: var(–g4); color: var(–g1);
font-size: .68rem; font-weight: 700;
padding: 3px 8px; border-radius: 20px; white-space: nowrap;
}
.card-name {
font-family: ‘Syne’, sans-serif;
font-size: .9rem; font-weight: 800; line-height: 1.2;
}
.card-desc { font-size: .75rem; color: var(–soft); }
.card-bottom { display: flex; align-items: center; justify-content: space-between; margin-top: auto; }
.card-price { font-family: ‘Syne’, sans-serif; font-size: 1.15rem; font-weight: 800; color: var(–g1); }
.card-add {
width: 32px; height: 32px;
background: var(–g1); color: #fff;
border: none; border-radius: 9px;
font-size: 1.2rem; cursor: pointer;
display: flex; align-items: center; justify-content: center;
transition: background .2s, transform .15s; flex-shrink: 0;
}
.card-add:hover { background: var(–g2); }
.card-add:active { transform: scale(.9); }

/* OVERLAY */
.overlay {
position: fixed; inset: 0;
background: rgba(5,20,12,.5);
z-index: 150; opacity: 0; pointer-events: none;
transition: opacity .3s; backdrop-filter: blur(2px);
}
.overlay.on { opacity: 1; pointer-events: all; }

/* CART SHEET — bottom on mobile, side on desktop */
.cart-sheet {
position: fixed; bottom: 0; left: 0; right: 0;
background: var(–white);
border-radius: 24px 24px 0 0;
z-index: 160; max-height: 92dvh;
display: flex; flex-direction: column;
transform: translateY(100%);
transition: transform .38s cubic-bezier(.4,0,.2,1);
box-shadow: 0 -8px 40px rgba(15,110,61,.14);
}
.cart-sheet.open { transform: translateY(0); }
@media (min-width: 640px) {
.cart-sheet {
left: auto; right: 0; top: 0; bottom: 0;
width: min(420px, 100vw);
border-radius: 0; max-height: 100dvh;
transform: translateX(100%);
}
.cart-sheet.open { transform: translateX(0); }
}
.sheet-handle {
width: 36px; height: 4px;
background: var(–border); border-radius: 2px;
margin: 10px auto 0; flex-shrink: 0;
}
@media (min-width: 640px) { .sheet-handle { display: none; } }
.sheet-hdr {
padding: 16px 20px 14px;
border-bottom: 1.5px solid var(–border);
display: flex; align-items: center; justify-content: space-between;
flex-shrink: 0;
}
.sheet-hdr h2 { font-family: ‘Syne’, sans-serif; font-size: 1.2rem; font-weight: 800; }
.btn-close {
width: 32px; height: 32px;
background: var(–g4); border: none; border-radius: 50%;
font-size: .9rem; cursor: pointer; color: var(–g1); font-weight: 700;
display: flex; align-items: center; justify-content: center;
transition: background .2s;
}
.btn-close:hover { background: var(–g3); }
.sheet-body { flex: 1; overflow-y: auto; padding: 12px 20px; -webkit-overflow-scrolling: touch; }
.cart-empty-state {
display: flex; flex-direction: column; align-items: center; justify-content: center;
height: 180px; color: var(–soft); gap: 10px; font-size: .9rem;
}
.cart-empty-state div:first-child { font-size: 2.8rem; }
.cart-item {
display: flex; align-items: center; gap: 12px;
padding: 12px 0; border-bottom: 1px solid var(–border);
}
.ci-emoji { font-size: 1.6rem; flex-shrink: 0; width: 36px; text-align: center; }
.ci-info { flex: 1; min-width: 0; }
.ci-name { font-size: .9rem; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.ci-price { font-size: .82rem; color: var(–g1); font-weight: 600; margin-top: 2px; }
.ci-ctrl { display: flex; align-items: center; gap: 6px; flex-shrink: 0; }
.qty-btn {
width: 28px; height: 28px;
border: 1.5px solid var(–border); background: var(–bg);
border-radius: 8px; font-size: .95rem; cursor: pointer;
display: flex; align-items: center; justify-content: center;
color: var(–text); font-weight: 600; transition: all .15s;
}
.qty-btn:hover { border-color: var(–g1); color: var(–g1); background: var(–g4); }
.qty-btn:active { transform: scale(.9); }
.ci-qty { font-weight: 700; min-width: 18px; text-align: center; font-size: .9rem; }

/* SHEET FOOTER */
.sheet-ftr {
padding: 16px 20px 24px;
border-top: 1.5px solid var(–border);
flex-shrink: 0; background: var(–white);
}
.total-row {
display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px;
}
.total-lbl { font-size: .88rem; color: var(–soft); font-weight: 500; }
.total-val { font-family: ‘Syne’, sans-serif; font-size: 1.5rem; font-weight: 800; color: var(–g1); }

/* ORDER FORM */
.oform { display: flex; flex-direction: column; gap: 10px; }
.oform-row { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
.ff { display: flex; flex-direction: column; gap: 4px; }
.ff label { font-size: .75rem; font-weight: 700; color: var(–soft); text-transform: uppercase; letter-spacing: .4px; }
.ff input, .ff select {
border: 1.5px solid var(–border); border-radius: 10px;
padding: 11px 13px; font-family: inherit;
font-size: .92rem; color: var(–text); background: var(–bg);
outline: none; transition: border-color .2s, background .2s; width: 100%;
}
.ff input:focus, .ff select:focus { border-color: var(–g1); background: var(–white); }
.btn-order {
background: var(–g1); color: #fff; border: none;
border-radius: 12px; padding: 14px;
font-family: ‘Syne’, sans-serif; font-size: 1rem; font-weight: 800;
cursor: pointer; transition: background .2s, transform .15s; width: 100%; margin-top: 2px;
}
.btn-order:hover { background: var(–g2); }
.btn-order:active { transform: scale(.98); }

/* SUCCESS */
.success-state {
display: flex; flex-direction: column; align-items: center;
text-align: center; padding: 32px 20px; gap: 10px;
}
.success-icon { font-size: 3.5rem; }
.success-state h3 { font-family: ‘Syne’, sans-serif; font-size: 1.2rem; font-weight: 800; }
.success-state p { font-size: .88rem; color: var(–soft); line-height: 1.5; }
.success-amount {
background: var(–g4); border: 1.5px solid var(–g3);
border-radius: 10px; padding: 10px 24px;
font-family: ‘Syne’, sans-serif; font-size: 1.4rem; font-weight: 800; color: var(–g1);
margin: 4px 0;
}

/* MODAL */
.modal-wrap {
position: fixed; inset: 0;
background: rgba(5,20,12,.55);
z-index: 200; display: none;
align-items: center; justify-content: center;
padding: 20px; backdrop-filter: blur(3px);
}
.modal-wrap.on { display: flex; }
.modal {
background: var(–white); border-radius: 20px;
padding: 28px 24px; width: 100%; max-width: 380px;
box-shadow: 0 20px 60px rgba(15,110,61,.2);
animation: popIn .28s ease;
}
@keyframes popIn { from { opacity:0; transform: scale(.94) translateY(8px); } to { opacity:1; transform: none; } }
.modal-hdr { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; }
.modal-hdr h2 { font-family: ‘Syne’, sans-serif; font-size: 1.2rem; font-weight: 800; }
.modal-err { color: var(–red); font-size: .82rem; margin-bottom: 8px; display: none; }

/* ADMIN */
.admin-hdr {
display: flex; align-items: center; justify-content: space-between;
margin-bottom: 20px; gap: 12px; flex-wrap: wrap;
}
.admin-hdr h1 { font-family: ‘Syne’, sans-serif; font-size: 1.5rem; font-weight: 800; }
.admin-hdr-btns { display: flex; gap: 8px; }
.btn-back {
background: var(–g4); border: 1.5px solid var(–g3); color: var(–g1);
border-radius: 10px; padding: 9px 16px;
font-family: inherit; font-size: .85rem; font-weight: 600;
cursor: pointer; transition: all .2s;
}
.btn-back:hover { background: var(–g3); }
.btn-danger {
background: #fff3f3; border: 1.5px solid #ffd5d5; color: var(–red);
border-radius: 10px; padding: 9px 16px;
font-family: inherit; font-size: .85rem; font-weight: 600;
cursor: pointer; transition: all .2s;
}
.btn-danger:hover { background: #ffe5e5; }

.stats-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 24px; }
.stat-card {
background: var(–white); border: 1.5px solid var(–border);
border-radius: var(–r); padding: 16px;
display: flex; flex-direction: column; gap: 4px;
}
.stat-label { font-size: .75rem; color: var(–soft); font-weight: 600; text-transform: uppercase; letter-spacing: .4px; }
.stat-val { font-family: ‘Syne’, sans-serif; font-size: 1.6rem; font-weight: 800; color: var(–g1); }

.order-card {
background: var(–white); border: 1.5px solid var(–border);
border-radius: var(–r); padding: 16px 18px; margin-bottom: 12px;
transition: border-color .2s;
}
.order-card:hover { border-color: var(–g3); }
.oc-hdr {
display: flex; align-items: flex-start; justify-content: space-between;
margin-bottom: 10px; gap: 8px;
}
.oc-name { font-family: ‘Syne’, sans-serif; font-size: 1rem; font-weight: 800; }
.oc-meta { font-size: .8rem; color: var(–soft); margin-top: 2px; }
.oc-time {
font-size: .75rem; color: var(–soft); background: var(–bg);
border-radius: 8px; padding: 4px 9px; white-space: nowrap; flex-shrink: 0;
}
.oc-items { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 10px; }
.oc-tag {
background: var(–g4); color: var(–g1);
border-radius: 8px; padding: 4px 10px; font-size: .8rem; font-weight: 600;
}
.oc-foot {
display: flex; align-items: center; justify-content: space-between;
border-top: 1px solid var(–border); padding-top: 10px;
font-size: .82rem; color: var(–soft);
}
.oc-total { font-family: ‘Syne’, sans-serif; font-size: 1.05rem; font-weight: 800; color: var(–g1); }
.empty-orders { text-align: center; padding: 60px 20px; color: var(–soft); }
.empty-orders div:first-child { font-size: 3rem; margin-bottom: 10px; }

/* TOAST */
.toast {
position: fixed; bottom: 24px; left: 50%;
transform: translateX(-50%) translateY(80px);
background: var(–text); color: #fff;
padding: 11px 22px; border-radius: 50px;
font-size: .88rem; font-weight: 600;
z-index: 400; transition: transform .32s cubic-bezier(.4,0,.2,1);
pointer-events: none; white-space: nowrap;
box-shadow: 0 6px 24px rgba(0,0,0,.2);
}
.toast.show { transform: translateX(-50%) translateY(0); }
</style>

</head>
<body>

<header>
  <div class="hdr">
    <div class="logo">🌿 Bufet<div class="logo-dot"></div></div>
    <div class="hdr-right">
      <button class="btn-cart" onclick="openCart()">
        🛒 Košík
        <span class="badge" id="badge"></span>
      </button>
      <button class="btn-admin" onclick="openAdminLogin()">Admin</button>
    </div>
  </div>
</header>

<!-- SHOP -->

<div id="shopPage">
  <div class="hero">
    <h1>Vítej v Bufetu 👋</h1>
    <p>Vyber si zboží a přidej do košíku</p>
  </div>
  <div class="notice">
    <div class="notice-icon">💳</div>
    <div><strong>Platba předem hotově</strong> — peníze přines při vyzvednutí objednávky</div>
  </div>
  <div class="sec-wrap">
    <div class="sec-label"><span>🍫 Krémové tyčinky</span></div>
    <div class="grid" id="grid-kra"></div>
  </div>
  <div class="sec-wrap">
    <div class="sec-label"><span>💧 Liquidy</span></div>
    <div class="grid" id="grid-liquid"></div>
  </div>
  <div class="sec-wrap">
    <div class="sec-label"><span>🌬️ Hlavy &amp; Vapy</span></div>
    <div class="grid" id="grid-vapo"></div>
  </div>
</div>

<!-- ADMIN -->

<div id="adminPage">
  <div class="admin-hdr">
    <h1>📋 Objednávky</h1>
    <div class="admin-hdr-btns">
      <button class="btn-danger" onclick="clearOrders()">🗑 Smazat vše</button>
      <button class="btn-back" onclick="closeAdmin()">← Zpět</button>
    </div>
  </div>
  <div class="stats-row">
    <div class="stat-card">
      <div class="stat-label">Objednávky</div>
      <div class="stat-val" id="statCount">0</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Celkový obrat</div>
      <div class="stat-val" id="statRev">0 Kč</div>
    </div>
  </div>
  <div id="ordersList"></div>
</div>

<!-- OVERLAY -->

<div class="overlay" id="overlay" onclick="closeCart()"></div>

<!-- CART SHEET -->

<div class="cart-sheet" id="cartSheet">
  <div class="sheet-handle"></div>
  <div class="sheet-hdr">
    <h2>🛒 Košík</h2>
    <button class="btn-close" onclick="closeCart()">✕</button>
  </div>
  <div class="sheet-body" id="sheetBody"></div>
  <div class="sheet-ftr" id="sheetFtr"></div>
</div>

<!-- ADMIN LOGIN MODAL -->

<div class="modal-wrap" id="adminModal">
  <div class="modal">
    <div class="modal-hdr">
      <h2>🔐 Admin přihlášení</h2>
      <button class="btn-close" onclick="closeAdminModal()">✕</button>
    </div>
    <div class="ff" style="margin-bottom:12px;">
      <label>Heslo</label>
      <input type="password" id="adminPass" placeholder="Zadej heslo…" onkeydown="if(event.key==='Enter')loginAdmin()">
    </div>
    <div class="modal-err" id="adminErr">❌ Špatné heslo, zkus znovu</div>
    <button class="btn-order" onclick="loginAdmin()">Přihlásit se</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const PRODUCTS = [
  { id:'kra-s',  name:'Malý Kra',       desc:'Do 3 lžiček',              emoji:'🍫', price:20,  cat:'kra',    tag:'Do 3 lžiček' },
  { id:'kra-l',  name:'Velký Kra',      desc:'4+ lžiček',                emoji:'🍫', price:40,  cat:'kra',    tag:'4+ lžiček' },
  { id:'liq-10', name:'Liquid 10 ml',   desc:'50 mg nikotinu',           emoji:'💧', price:115, cat:'liquid', tag:'10 ml · 50mg' },
  { id:'liq-30', name:'Liquid 30 ml',   desc:'50 mg nikotinu',           emoji:'💧', price:225, cat:'liquid', tag:'30 ml · 50mg' },
  { id:'hd-std', name:'Hlava standard', desc:'Standardní hlava do vapu', emoji:'🔩', price:85,  cat:'vapo',   tag:'Standard' },
  { id:'hd-pro', name:'Hlava premium',  desc:'Prémiová hlava do vapu',   emoji:'⚙️', price:100, cat:'vapo',   tag:'Premium' },
  { id:'vp-std', name:'Vapo',           desc:'Standardní vapo',          emoji:'💨', price:400, cat:'vapo',   tag:'Standard' },
  { id:'vp-thc', name:'THC Vapo',       desc:'THC vapo',                 emoji:'🌿', price:450, cat:'vapo',   tag:'THC' },
];

const TIMES = [
  'Přestávka 1 (9:00)',
  'Přestávka 2 (10:55)',
  'Přestávka 3 (12:50)',
  'Po skončení (14:00)',
];

// ▼▼▼ SEM VLOŽ SVOU URL Z GOOGLE APPS SCRIPT ▼▼▼
const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbwCApeK924CMDyKNqAcIWvcq8kBfgL981QUO84pzv-zk0LRFV7ApQxxyOeajEgQXENR/exec';
// ▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲

let cart = {};

const $ = id => document.getElementById(id);

/* ── RENDER PRODUCTS ── */
function renderProducts() {
  const map = { kra:'grid-kra', liquid:'grid-liquid', vapo:'grid-vapo' };
  Object.values(map).forEach(id => $(id).innerHTML = '');
  PRODUCTS.forEach(p => {
    const d = document.createElement('div');
    d.className = 'card';
    d.innerHTML = `
      <div class="card-top">
        <div class="card-emoji">${p.emoji}</div>
        <div class="card-tag">${p.tag}</div>
      </div>
      <div>
        <div class="card-name">${p.name}</div>
        <div class="card-desc">${p.desc}</div>
      </div>
      <div class="card-bottom">
        <div class="card-price">${p.price} Kč</div>
        <button class="card-add" onclick="event.stopPropagation();addToCart('${p.id}')">+</button>
      </div>`;
    d.onclick = () => addToCart(p.id);
    $(map[p.cat]).appendChild(d);
  });
}

/* ── CART ── */
function addToCart(id) {
  cart[id] = (cart[id] || 0) + 1;
  updateBadge();
  showToast('Přidáno do košíku ✓');
  if ($('cartSheet').classList.contains('open')) renderSheet();
}
function removeFromCart(id) {
  if (!cart[id]) return;
  if (cart[id] > 1) cart[id]--;
  else delete cart[id];
  updateBadge();
  renderSheet();
}
function cartTotal() {
  return Object.entries(cart).reduce((s,[id,q]) => {
    const p = PRODUCTS.find(x=>x.id===id);
    return s + (p ? p.price*q : 0);
  }, 0);
}
function cartCount() { return Object.values(cart).reduce((a,b)=>a+b, 0); }
function updateBadge() {
  const n = cartCount();
  const b = $('badge');
  b.textContent = n;
  b.style.display = n > 0 ? 'flex' : 'none';
}

function openCart() {
  renderSheet();
  $('cartSheet').classList.add('open');
  $('overlay').classList.add('on');
  document.body.style.overflow = 'hidden';
}
function closeCart() {
  $('cartSheet').classList.remove('open');
  $('overlay').classList.remove('on');
  document.body.style.overflow = '';
}

function renderSheet() {
  const body = $('sheetBody');
  const ftr  = $('sheetFtr');
  const entries = Object.entries(cart).filter(([,q])=>q>0);

  if (!entries.length) {
    body.innerHTML = `<div class="cart-empty-state"><div>🛒</div><div>Košík je prázdný</div></div>`;
    ftr.innerHTML = '';
    return;
  }

  body.innerHTML = entries.map(([id,qty]) => {
    const p = PRODUCTS.find(x=>x.id===id);
    return `<div class="cart-item">
      <div class="ci-emoji">${p.emoji}</div>
      <div class="ci-info">
        <div class="ci-name">${p.name}</div>
        <div class="ci-price">${p.price * qty} Kč</div>
      </div>
      <div class="ci-ctrl">
        <button class="qty-btn" onclick="removeFromCart('${id}')">−</button>
        <span class="ci-qty">${qty}</span>
        <button class="qty-btn" onclick="addToCart('${id}')">+</button>
      </div>
    </div>`;
  }).join('');

  ftr.innerHTML = `
    <div class="total-row">
      <span class="total-lbl">Celkem k zaplacení</span>
      <span class="total-val">${cartTotal()} Kč</span>
    </div>
    <div class="oform">
      <div class="oform-row">
        <div class="ff">
          <label>Jméno a příjmení</label>
          <input type="text" id="oName" placeholder="Jan Novák" autocomplete="name">
        </div>
        <div class="ff">
          <label>Třída</label>
          <input type="text" id="oClass" placeholder="3.A" autocomplete="off">
        </div>
      </div>
      <div class="ff">
        <label>Čas vyzvednutí</label>
        <select id="oTime">${TIMES.map(t=>`<option>${t}</option>`).join('')}</select>
      </div>
      <button class="btn-order" onclick="placeOrder()">✅ Objednat · ${cartTotal()} Kč</button>
    </div>`;
}

/* ── PLACE ORDER ── */
async function placeOrder() {
  const name = $('oName').value.trim();
  const cls  = $('oClass').value.trim();
  const time = $('oTime').value;

  if (!name) { showToast('⚠️ Zadej své jméno!'); $('oName').focus(); return; }
  if (!cls)  { showToast('⚠️ Zadej svou třídu!'); $('oClass').focus(); return; }

  const entries = Object.entries(cart).filter(([,q])=>q>0);
  if (!entries.length) return;

  const total = cartTotal();

  const order = {
    name, cls, time,
    items: entries.map(([id,qty]) => {
      const p = PRODUCTS.find(x=>x.id===id);
      return { name: p.name, qty, lineTotal: p.price * qty };
    }),
    total,
    timestamp: new Date().toLocaleString('cs-CZ', {
      day:'2-digit', month:'2-digit', year:'numeric',
      hour:'2-digit', minute:'2-digit'
    })
  };

  // Show loading
  $('sheetBody').innerHTML = `
    <div class="cart-empty-state">
      <div>⏳</div>
      <div>Odesílám objednávku…</div>
    </div>`;
  $('sheetFtr').innerHTML = '';

  try {
    const res = await fetch(SCRIPT_URL, {
      method: 'POST',
      body: JSON.stringify({ action: 'addOrder', order })
    });
    const data = await res.json();
    if (data.status !== 'ok') throw new Error(data.error || 'Chyba');

    cart = {};
    updateBadge();

    $('sheetBody').innerHTML = `
      <div class="success-state">
        <div class="success-icon">🎉</div>
        <h3>Objednávka přijata!</h3>
        <p>Tvoje objednávka byla úspěšně zapsána.<br>Přines peníze hotově při vyzvednutí.</p>
        <div class="success-amount">${total} Kč</div>
        <p>⏰ Vyzvednutí: <strong>${time}</strong></p>
      </div>`;
    $('sheetFtr').innerHTML = `<button class="btn-order" onclick="closeCart()">Zavřít</button>`;
  } catch(e) {
    $('sheetBody').innerHTML = `
      <div class="cart-empty-state">
        <div>❌</div>
        <div>Nepodařilo se odeslat.<br>Zkontroluj připojení a zkus znovu.</div>
      </div>`;
    $('sheetFtr').innerHTML = `<button class="btn-order" onclick="renderSheet()">← Zpět do košíku</button>`;
  }
}

/* ── ADMIN ── */
function openAdminLogin() {
  $('adminModal').classList.add('on');
  $('adminPass').value = '';
  $('adminErr').style.display = 'none';
  setTimeout(() => $('adminPass').focus(), 150);
}
function closeAdminModal() { $('adminModal').classList.remove('on'); }
function loginAdmin() {
  if ($('adminPass').value === 'kantyna2024') {
    closeAdminModal();
    $('shopPage').style.display = 'none';
    $('adminPage').style.display = 'block';
    renderAdmin();
  } else {
    $('adminErr').style.display = 'block';
    $('adminPass').select();
  }
}
function closeAdmin() {
  $('adminPage').style.display = 'none';
  $('shopPage').style.display = 'block';
}
async function clearOrders() {
  if (!confirm('Smazat všechny objednávky? Tato akce je nevratná.')) return;
  try {
    const res = await fetch(SCRIPT_URL, {
      method: 'POST',
      body: JSON.stringify({ action: 'clearOrders' })
    });
    const data = await res.json();
    if (data.status === 'ok') renderAdmin();
    else showToast('❌ Nepodařilo se smazat');
  } catch(e) { showToast('❌ Chyba připojení'); }
}
async function renderAdmin() {
  $('ordersList').innerHTML = `<div class="empty-orders"><div>⏳</div><div>Načítám objednávky…</div></div>`;
  $('statCount').textContent = '…';
  $('statRev').textContent = '…';

  try {
    const res = await fetch(SCRIPT_URL + '?action=getOrders');
    const data = await res.json();
    if (data.status !== 'ok') throw new Error(data.error);

    const orders = data.orders;
    const rev = orders.reduce((s,o) => s + Number(o.total), 0);
    $('statCount').textContent = orders.length;
    $('statRev').textContent   = rev.toLocaleString('cs-CZ') + ' Kč';

    if (!orders.length) {
      $('ordersList').innerHTML = `<div class="empty-orders"><div>📭</div><div>Žádné objednávky zatím</div></div>`;
      return;
    }
    $('ordersList').innerHTML = orders.map(o => `
      <div class="order-card">
        <div class="oc-hdr">
          <div>
            <div class="oc-name">👤 ${o.name}</div>
            <div class="oc-meta">Třída: <strong>${o.cls}</strong> &nbsp;·&nbsp; ⏰ ${o.time}</div>
          </div>
          <div class="oc-time">${o.timestamp}</div>
        </div>
        <div class="oc-items">
          ${o.itemsText.split(', ').map(i => `<span class="oc-tag">${i}</span>`).join('')}
        </div>
        <div class="oc-foot">
          <span>K zaplacení při vyzvednutí</span>
          <span class="oc-total">${Number(o.total).toLocaleString('cs-CZ')} Kč</span>
        </div>
      </div>`).join('');
  } catch(e) {
    $('ordersList').innerHTML = `<div class="empty-orders"><div>❌</div><div>Nepodařilo se načíst.<br>Zkontroluj SCRIPT_URL v kódu.</div></div>`;
  }
}

/* ── TOAST ── */
let toastTmr;
function showToast(msg) {
  const t = $('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(toastTmr);
  toastTmr = setTimeout(() => t.classList.remove('show'), 2200);
}

/* ── INIT ── */
renderProducts();
</script>

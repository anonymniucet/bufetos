<!DOCTYPE html>

<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bufet 🛒</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --green: #1a7a4a;
    --green-light: #25a465;
    --green-pale: #e8f7ef;
    --green-mid: #c2e8d5;
    --white: #ffffff;
    --off-white: #f5faf7;
    --text: #0d2b1a;
    --text-soft: #4a7060;
    --border: #c5dfd0;
    --shadow: 0 4px 24px rgba(26,122,74,0.10);
    --radius: 16px;
  }

- { box-sizing: border-box; margin: 0; padding: 0; }

body {
font-family: ‘DM Sans’, sans-serif;
background: var(–off-white);
color: var(–text);
min-height: 100vh;
}

/* HEADER */
header {
background: var(–white);
border-bottom: 2px solid var(–border);
position: sticky; top: 0; z-index: 100;
box-shadow: 0 2px 16px rgba(26,122,74,0.08);
}
.header-inner {
max-width: 1100px;
margin: 0 auto;
padding: 0 24px;
height: 70px;
display: flex;
align-items: center;
justify-content: space-between;
}
.logo {
font-family: ‘Syne’, sans-serif;
font-size: 1.6rem;
font-weight: 800;
color: var(–green);
letter-spacing: -1px;
display: flex;
align-items: center;
gap: 10px;
}
.logo span { font-size: 1.8rem; }
.header-actions { display: flex; align-items: center; gap: 12px; }
.cart-btn {
background: var(–green);
color: white;
border: none;
border-radius: 50px;
padding: 10px 22px;
font-family: ‘DM Sans’, sans-serif;
font-size: 0.95rem;
font-weight: 500;
cursor: pointer;
display: flex;
align-items: center;
gap: 8px;
transition: background 0.2s, transform 0.15s;
position: relative;
}
.cart-btn:hover { background: var(–green-light); transform: translateY(-1px); }
.cart-badge {
background: #ff4444;
color: white;
border-radius: 50%;
width: 20px; height: 20px;
font-size: 0.72rem;
font-weight: 700;
display: flex; align-items: center; justify-content: center;
position: absolute;
top: -6px; right: -6px;
display: none;
}
.admin-btn {
background: transparent;
border: 2px solid var(–border);
color: var(–text-soft);
border-radius: 50px;
padding: 8px 18px;
font-family: ‘DM Sans’, sans-serif;
font-size: 0.88rem;
cursor: pointer;
transition: all 0.2s;
}
.admin-btn:hover { border-color: var(–green); color: var(–green); }

/* MAIN */
main { max-width: 1100px; margin: 0 auto; padding: 40px 24px 80px; }

.hero {
text-align: center;
margin-bottom: 48px;
}
.hero h1 {
font-family: ‘Syne’, sans-serif;
font-size: clamp(2rem, 5vw, 3rem);
font-weight: 800;
color: var(–text);
margin-bottom: 10px;
}
.hero p {
color: var(–text-soft);
font-size: 1.05rem;
}
.notice-banner {
background: linear-gradient(135deg, var(–green), var(–green-light));
color: white;
border-radius: 14px;
padding: 14px 24px;
margin-bottom: 40px;
text-align: center;
font-weight: 500;
font-size: 1rem;
display: flex;
align-items: center;
justify-content: center;
gap: 10px;
}
.notice-banner span { font-size: 1.4rem; }

/* PRODUCT GRID */
.section-title {
font-family: ‘Syne’, sans-serif;
font-size: 1.2rem;
font-weight: 700;
color: var(–green);
text-transform: uppercase;
letter-spacing: 1px;
margin-bottom: 20px;
padding-bottom: 10px;
border-bottom: 2px solid var(–green-mid);
}
.products-grid {
display: grid;
grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
gap: 20px;
margin-bottom: 40px;
}
.product-card {
background: var(–white);
border-radius: var(–radius);
border: 2px solid var(–border);
padding: 24px;
transition: transform 0.2s, box-shadow 0.2s, border-color 0.2s;
display: flex;
flex-direction: column;
gap: 12px;
}
.product-card:hover {
transform: translateY(-3px);
box-shadow: var(–shadow);
border-color: var(–green-light);
}
.product-emoji { font-size: 2.4rem; }
.product-info { flex: 1; }
.product-name {
font-family: ‘Syne’, sans-serif;
font-size: 1.1rem;
font-weight: 700;
margin-bottom: 4px;
}
.product-desc {
font-size: 0.85rem;
color: var(–text-soft);
line-height: 1.5;
}
.product-tag {
display: inline-block;
background: var(–green-pale);
color: var(–green);
border-radius: 6px;
padding: 3px 10px;
font-size: 0.78rem;
font-weight: 600;
margin-top: 6px;
}
.product-footer {
display: flex;
align-items: center;
justify-content: space-between;
margin-top: 4px;
}
.product-price {
font-family: ‘Syne’, sans-serif;
font-size: 1.4rem;
font-weight: 800;
color: var(–green);
}
.add-btn {
background: var(–green);
color: white;
border: none;
border-radius: 10px;
width: 40px; height: 40px;
font-size: 1.4rem;
cursor: pointer;
display: flex; align-items: center; justify-content: center;
transition: background 0.2s, transform 0.15s;
flex-shrink: 0;
}
.add-btn:hover { background: var(–green-light); transform: scale(1.1); }

/* CART SIDEBAR OVERLAY */
.overlay {
position: fixed; inset: 0;
background: rgba(10,30,20,0.45);
z-index: 200;
opacity: 0;
pointer-events: none;
transition: opacity 0.3s;
}
.overlay.active { opacity: 1; pointer-events: all; }

.cart-sidebar {
position: fixed;
right: 0; top: 0; bottom: 0;
width: min(420px, 100vw);
background: var(–white);
z-index: 201;
display: flex;
flex-direction: column;
transform: translateX(100%);
transition: transform 0.35s cubic-bezier(.4,0,.2,1);
box-shadow: -8px 0 40px rgba(26,122,74,0.12);
}
.cart-sidebar.open { transform: translateX(0); }

.cart-header {
padding: 28px 24px 20px;
border-bottom: 2px solid var(–border);
display: flex;
align-items: center;
justify-content: space-between;
}
.cart-header h2 {
font-family: ‘Syne’, sans-serif;
font-size: 1.4rem;
font-weight: 800;
}
.close-btn {
background: var(–green-pale);
border: none;
width: 38px; height: 38px;
border-radius: 50%;
font-size: 1.1rem;
cursor: pointer;
color: var(–green);
transition: background 0.2s;
display: flex; align-items: center; justify-content: center;
}
.close-btn:hover { background: var(–green-mid); }

.cart-items {
flex: 1;
overflow-y: auto;
padding: 16px 24px;
}
.cart-empty {
text-align: center;
color: var(–text-soft);
padding: 40px 0;
font-size: 1rem;
}
.cart-empty .empty-icon { font-size: 3rem; margin-bottom: 12px; }
.cart-item {
display: flex;
align-items: center;
gap: 14px;
padding: 14px 0;
border-bottom: 1px solid var(–border);
}
.cart-item-emoji { font-size: 1.8rem; flex-shrink: 0; }
.cart-item-info { flex: 1; }
.cart-item-name { font-weight: 600; font-size: 0.95rem; }
.cart-item-price { color: var(–green); font-size: 0.88rem; font-weight: 500; }
.cart-item-controls {
display: flex;
align-items: center;
gap: 8px;
}
.qty-btn {
width: 28px; height: 28px;
border-radius: 8px;
border: 2px solid var(–border);
background: transparent;
font-size: 1rem;
cursor: pointer;
display: flex; align-items: center; justify-content: center;
color: var(–text);
transition: all 0.15s;
}
.qty-btn:hover { border-color: var(–green); color: var(–green); }
.qty { font-weight: 700; min-width: 20px; text-align: center; }

.cart-footer { padding: 20px 24px 28px; border-top: 2px solid var(–border); }
.cart-total {
display: flex;
justify-content: space-between;
align-items: center;
margin-bottom: 20px;
}
.cart-total-label { font-size: 1rem; color: var(–text-soft); }
.cart-total-price { font-family: ‘Syne’, sans-serif; font-size: 1.5rem; font-weight: 800; color: var(–green); }

/* ORDER FORM */
.order-form { display: flex; flex-direction: column; gap: 12px; }
.form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.form-field { display: flex; flex-direction: column; gap: 5px; }
.form-field label { font-size: 0.82rem; font-weight: 600; color: var(–text-soft); }
.form-field input, .form-field select {
border: 2px solid var(–border);
border-radius: 10px;
padding: 10px 14px;
font-family: ‘DM Sans’, sans-serif;
font-size: 0.95rem;
color: var(–text);
background: var(–off-white);
outline: none;
transition: border-color 0.2s;
}
.form-field input:focus, .form-field select:focus { border-color: var(–green); }
.order-btn {
background: var(–green);
color: white;
border: none;
border-radius: 12px;
padding: 15px;
font-family: ‘Syne’, sans-serif;
font-size: 1rem;
font-weight: 700;
cursor: pointer;
transition: background 0.2s, transform 0.15s;
margin-top: 4px;
}
.order-btn:hover { background: var(–green-light); transform: translateY(-1px); }

/* SUCCESS MESSAGE */
.success-msg {
background: var(–green-pale);
border: 2px solid var(–green-mid);
border-radius: 12px;
padding: 20px;
text-align: center;
color: var(–green);
}
.success-msg .success-icon { font-size: 2.5rem; margin-bottom: 8px; }
.success-msg h3 { font-family: ‘Syne’, sans-serif; font-weight: 700; margin-bottom: 6px; }
.success-msg p { font-size: 0.9rem; color: var(–text-soft); }

/* ADMIN MODAL */
.modal-overlay {
position: fixed; inset: 0;
background: rgba(10,30,20,0.55);
z-index: 300;
display: none;
align-items: center;
justify-content: center;
padding: 20px;
}
.modal-overlay.active { display: flex; }
.modal {
background: var(–white);
border-radius: 20px;
padding: 36px;
width: 100%;
max-width: 520px;
box-shadow: 0 20px 60px rgba(26,122,74,0.2);
animation: modalIn 0.3s ease;
}
@keyframes modalIn { from { opacity: 0; transform: scale(0.95) translateY(10px); } to { opacity: 1; transform: none; } }
.modal h2 { font-family: ‘Syne’, sans-serif; font-size: 1.5rem; font-weight: 800; margin-bottom: 20px; }
.modal-close {
float: right;
background: var(–green-pale);
border: none;
width: 34px; height: 34px;
border-radius: 50%;
font-size: 1rem;
cursor: pointer;
color: var(–green);
display: flex; align-items: center; justify-content: center;
margin: -4px -4px 0 0;
}
.modal-close:hover { background: var(–green-mid); }

/* ADMIN PANEL */
.admin-panel { max-width: 1100px; margin: 0 auto; padding: 40px 24px; display: none; }
.admin-panel.active { display: block; }
.admin-header {
display: flex;
align-items: center;
justify-content: space-between;
margin-bottom: 32px;
}
.admin-header h1 { font-family: ‘Syne’, sans-serif; font-size: 2rem; font-weight: 800; }
.back-btn {
background: var(–green-pale);
border: 2px solid var(–green-mid);
color: var(–green);
border-radius: 10px;
padding: 9px 18px;
font-family: ‘DM Sans’, sans-serif;
font-weight: 500;
cursor: pointer;
transition: all 0.2s;
}
.back-btn:hover { background: var(–green-mid); }
.clear-btn {
background: #fff0f0;
border: 2px solid #ffcccc;
color: #cc2222;
border-radius: 10px;
padding: 9px 18px;
font-family: ‘DM Sans’, sans-serif;
font-weight: 500;
cursor: pointer;
transition: all 0.2s;
}
.clear-btn:hover { background: #ffe0e0; }

.orders-count {
background: var(–green-pale);
border: 2px solid var(–green-mid);
border-radius: 12px;
padding: 16px 24px;
margin-bottom: 24px;
display: flex;
align-items: center;
gap: 12px;
font-weight: 500;
color: var(–green);
}
.orders-count strong { font-family: ‘Syne’, sans-serif; font-size: 1.4rem; }

.order-card {
background: var(–white);
border: 2px solid var(–border);
border-radius: var(–radius);
padding: 22px 24px;
margin-bottom: 16px;
transition: border-color 0.2s;
}
.order-card:hover { border-color: var(–green-mid); }
.order-card-header {
display: flex;
align-items: flex-start;
justify-content: space-between;
margin-bottom: 14px;
}
.order-student { font-family: ‘Syne’, sans-serif; font-size: 1.1rem; font-weight: 700; }
.order-meta { font-size: 0.85rem; color: var(–text-soft); margin-top: 3px; }
.order-time {
font-size: 0.8rem;
color: var(–text-soft);
background: var(–off-white);
border-radius: 8px;
padding: 4px 10px;
white-space: nowrap;
}
.order-items { display: flex; flex-wrap: wrap; gap: 8px; }
.order-item-tag {
background: var(–green-pale);
color: var(–green);
border-radius: 8px;
padding: 5px 12px;
font-size: 0.85rem;
font-weight: 500;
}
.order-total-row {
margin-top: 14px;
padding-top: 12px;
border-top: 1px solid var(–border);
display: flex;
align-items: center;
justify-content: space-between;
font-size: 0.9rem;
color: var(–text-soft);
}
.order-total-amount { font-family: ‘Syne’, sans-serif; font-size: 1.1rem; font-weight: 800; color: var(–green); }
.no-orders { text-align: center; padding: 60px 0; color: var(–text-soft); }
.no-orders-icon { font-size: 3rem; margin-bottom: 12px; }

/* TOAST */
.toast {
position: fixed;
bottom: 30px; left: 50%;
transform: translateX(-50%) translateY(80px);
background: var(–green);
color: white;
padding: 13px 24px;
border-radius: 50px;
font-weight: 500;
font-size: 0.95rem;
z-index: 500;
transition: transform 0.35s cubic-bezier(.4,0,.2,1);
white-space: nowrap;
box-shadow: 0 8px 30px rgba(26,122,74,0.3);
}
.toast.show { transform: translateX(-50%) translateY(0); }

@media (max-width: 600px) {
.form-row { grid-template-columns: 1fr; }
main { padding: 24px 16px 60px; }
}
</style>

</head>
<body>

<!-- HEADER -->

<header>
  <div class="header-inner">
    <div class="logo"><span>🛒</span> Bufet</div>
    <div class="header-actions">
      <button class="cart-btn" onclick="openCart()">
        🛒 Košík
        <span class="cart-badge" id="cartBadge">0</span>
      </button>
      <button class="admin-btn" onclick="openAdminLogin()">Admin</button>
    </div>
  </div>
</header>

<!-- MAIN SHOP -->

<main id="shopPage">
  <div class="hero">
    <h1>Nabídka Bufetu 🌿</h1>
    <p>Vyber si zboží, přidej do košíku a objednej</p>
  </div>

  <div class="notice-banner">
    <span>💳</span>
    <strong>Platba předem hotově</strong> — peníze přines při vyzvednutí objednávky
  </div>

  <div class="section-title">🍫 Krémové tyčinky</div>
  <div class="products-grid" id="kra-grid"></div>

  <div class="section-title">💧 Liquidy</div>
  <div class="products-grid" id="liquid-grid"></div>

  <div class="section-title">🌬️ Hlavy & Vapy</div>
  <div class="products-grid" id="vapo-grid"></div>
</main>

<!-- ADMIN PANEL -->

<div class="admin-panel" id="adminPage">
  <div class="admin-header">
    <h1>📋 Admin — Objednávky</h1>
    <div style="display:flex;gap:10px;">
      <button class="clear-btn" onclick="clearOrders()">🗑️ Smazat vše</button>
      <button class="back-btn" onclick="closeAdmin()">← Zpět do obchodu</button>
    </div>
  </div>
  <div class="orders-count" id="ordersCount"></div>
  <div id="ordersList"></div>
</div>

<!-- CART OVERLAY -->

<div class="overlay" id="overlay" onclick="closeCart()"></div>

<!-- CART SIDEBAR -->

<div class="cart-sidebar" id="cartSidebar">
  <div class="cart-header">
    <h2>🛒 Košík</h2>
    <button class="close-btn" onclick="closeCart()">✕</button>
  </div>
  <div class="cart-items" id="cartItems"></div>
  <div class="cart-footer" id="cartFooter"></div>
</div>

<!-- ADMIN LOGIN MODAL -->

<div class="modal-overlay" id="adminModal">
  <div class="modal">
    <button class="modal-close" onclick="closeAdminModal()">✕</button>
    <h2>🔐 Admin přihlášení</h2>
    <div class="form-field" style="margin-bottom:16px;">
      <label>Heslo</label>
      <input type="password" id="adminPass" placeholder="Zadej heslo..." onkeydown="if(event.key==='Enter')loginAdmin()">
    </div>
    <div id="adminError" style="color:#cc2222;font-size:0.88rem;margin-bottom:10px;display:none;">❌ Špatné heslo</div>
    <button class="order-btn" onclick="loginAdmin()">Přihlásit se</button>
  </div>
</div>

<!-- TOAST -->

<div class="toast" id="toast"></div>

<script>
  const PRODUCTS = [
    { id:'kra-small', name:'Malý Kra', desc:'Do 3 lžiček', emoji:'🍫', price:20, cat:'kra', tag:'Do 3 lžiček' },
    { id:'kra-big',   name:'Velký Kra', desc:'4+ lžiček',  emoji:'🍫', price:40, cat:'kra', tag:'4+ lžiček' },
    { id:'liq-10',  name:'Liquid 10ml', desc:'50mg nikotinu', emoji:'💧', price:115, cat:'liquid', tag:'10ml · 50mg' },
    { id:'liq-30',  name:'Liquid 30ml', desc:'50mg nikotinu', emoji:'💧', price:225, cat:'liquid', tag:'30ml · 50mg' },
    { id:'head-std', name:'Hlava obyčejná', desc:'Standardní hlava do vapu', emoji:'🌬️', price:85,  cat:'vapo', tag:'Standard' },
    { id:'head-pro', name:'Hlava lepší',    desc:'Prémiová hlava do vapu',   emoji:'🌬️', price:100, cat:'vapo', tag:'Premium' },
    { id:'vapo-std', name:'Vapo',     desc:'Standardní vapo',  emoji:'💨', price:400, cat:'vapo', tag:'Standard' },
    { id:'vapo-thc', name:'THC Vapo', desc:'THC vapo',          emoji:'💨', price:450, cat:'vapo', tag:'THC' },
  ];

  const PICKUP_TIMES = ['Přestávka 1 (9:00)', 'Přestávka 2 (10:55)', 'Přestávka 3 (12:50)', 'Po skončení (14:00)'];

  let cart = {};

  // RENDER PRODUCTS
  function renderProducts() {
    const cats = { kra: 'kra-grid', liquid: 'liquid-grid', vapo: 'vapo-grid' };
    Object.values(cats).forEach(id => document.getElementById(id).innerHTML = '');
    PRODUCTS.forEach(p => {
      const el = document.createElement('div');
      el.className = 'product-card';
      el.innerHTML = `
        <div class="product-emoji">${p.emoji}</div>
        <div class="product-info">
          <div class="product-name">${p.name}</div>
          <div class="product-desc">${p.desc}</div>
          <span class="product-tag">${p.tag}</span>
        </div>
        <div class="product-footer">
          <div class="product-price">${p.price} Kč</div>
          <button class="add-btn" onclick="addToCart('${p.id}')" title="Přidat do košíku">+</button>
        </div>
      `;
      document.getElementById(cats[p.cat]).appendChild(el);
    });
  }

  // CART
  function addToCart(id) {
    cart[id] = (cart[id] || 0) + 1;
    updateCartBadge();
    showToast('Přidáno do košíku ✓');
  }
  function removeFromCart(id) {
    if (cart[id] > 1) cart[id]--;
    else delete cart[id];
    renderCartSidebar();
    updateCartBadge();
  }
  function updateCartBadge() {
    const total = Object.values(cart).reduce((a,b)=>a+b,0);
    const badge = document.getElementById('cartBadge');
    badge.textContent = total;
    badge.style.display = total > 0 ? 'flex' : 'none';
  }
  function cartTotal() {
    return Object.entries(cart).reduce((sum,[id,qty])=>{
      const p = PRODUCTS.find(x=>x.id===id);
      return sum + (p ? p.price*qty : 0);
    }, 0);
  }

  function openCart() {
    renderCartSidebar();
    document.getElementById('cartSidebar').classList.add('open');
    document.getElementById('overlay').classList.add('active');
  }
  function closeCart() {
    document.getElementById('cartSidebar').classList.remove('open');
    document.getElementById('overlay').classList.remove('active');
  }

  function renderCartSidebar() {
    const items = document.getElementById('cartItems');
    const footer = document.getElementById('cartFooter');
    const entries = Object.entries(cart).filter(([,q])=>q>0);

    if (entries.length === 0) {
      items.innerHTML = `<div class="cart-empty"><div class="empty-icon">🛒</div><div>Košík je prázdný</div></div>`;
      footer.innerHTML = '';
      return;
    }

    items.innerHTML = entries.map(([id,qty])=>{
      const p = PRODUCTS.find(x=>x.id===id);
      return `<div class="cart-item">
        <div class="cart-item-emoji">${p.emoji}</div>
        <div class="cart-item-info">
          <div class="cart-item-name">${p.name}</div>
          <div class="cart-item-price">${p.price * qty} Kč</div>
        </div>
        <div class="cart-item-controls">
          <button class="qty-btn" onclick="removeFromCart('${id}')">−</button>
          <span class="qty">${qty}</span>
          <button class="qty-btn" onclick="addToCart('${id}');renderCartSidebar()">+</button>
        </div>
      </div>`;
    }).join('');

    footer.innerHTML = `
      <div class="cart-total">
        <span class="cart-total-label">Celkem</span>
        <span class="cart-total-price">${cartTotal()} Kč</span>
      </div>
      <div class="order-form">
        <div class="form-row">
          <div class="form-field">
            <label>Jméno a příjmení</label>
            <input type="text" id="orderName" placeholder="Jan Novák">
          </div>
          <div class="form-field">
            <label>Třída</label>
            <input type="text" id="orderClass" placeholder="3.A">
          </div>
        </div>
        <div class="form-field">
          <label>Čas vyzvednutí</label>
          <select id="orderTime">
            ${PICKUP_TIMES.map(t=>`<option>${t}</option>`).join('')}
          </select>
        </div>
        <button class="order-btn" onclick="placeOrder()">✅ Objednat — ${cartTotal()} Kč</button>
      </div>
    `;
  }

  function placeOrder() {
    const name = document.getElementById('orderName').value.trim();
    const cls  = document.getElementById('orderClass').value.trim();
    const time = document.getElementById('orderTime').value;

    if (!name) { showToast('⚠️ Zadej jméno!'); return; }
    if (!cls)  { showToast('⚠️ Zadej třídu!'); return; }

    const entries = Object.entries(cart).filter(([,q])=>q>0);
    if (entries.length === 0) return;

    const order = {
      id: Date.now(),
      name, cls, time,
      items: entries.map(([id,qty])=>{
        const p = PRODUCTS.find(x=>x.id===id);
        return { name: p.name, qty, price: p.price * qty };
      }),
      total: cartTotal(),
      timestamp: new Date().toLocaleString('cs-CZ')
    };

    const orders = JSON.parse(localStorage.getItem('bufetOrders') || '[]');
    orders.unshift(order);
    localStorage.setItem('bufetOrders', JSON.stringify(orders));

    cart = {};
    updateCartBadge();

    const footer = document.getElementById('cartFooter');
    document.getElementById('cartItems').innerHTML = `
      <div class="success-msg" style="margin-top:24px;">
        <div class="success-icon">🎉</div>
        <h3>Objednávka přijata!</h3>
        <p>Nezapomeň přinést <strong>${order.total} Kč</strong> při vyzvednutí.</p>
        <p style="margin-top:6px;">Vyzvednutí: <strong>${time}</strong></p>
      </div>
    `;
    footer.innerHTML = `<button class="order-btn" onclick="closeCart()" style="margin-top:12px;">Zavřít košík</button>`;
  }

  // ADMIN
  function openAdminLogin() {
    document.getElementById('adminModal').classList.add('active');
    document.getElementById('adminPass').value = '';
    document.getElementById('adminError').style.display = 'none';
    setTimeout(()=>document.getElementById('adminPass').focus(), 100);
  }
  function closeAdminModal() {
    document.getElementById('adminModal').classList.remove('active');
  }
  function loginAdmin() {
    if (document.getElementById('adminPass').value === 'kantyna2024') {
      closeAdminModal();
      showAdmin();
    } else {
      document.getElementById('adminError').style.display = 'block';
    }
  }
  function showAdmin() {
    document.getElementById('shopPage').style.display = 'none';
    document.getElementById('adminPage').classList.add('active');
    renderAdmin();
  }
  function closeAdmin() {
    document.getElementById('shopPage').style.display = 'block';
    document.getElementById('adminPage').classList.remove('active');
  }
  function clearOrders() {
    if (confirm('Opravdu smazat všechny objednávky?')) {
      localStorage.removeItem('bufetOrders');
      renderAdmin();
    }
  }
  function renderAdmin() {
    const orders = JSON.parse(localStorage.getItem('bufetOrders') || '[]');
    const countEl = document.getElementById('ordersCount');
    const listEl  = document.getElementById('ordersList');

    const totalRevenue = orders.reduce((s,o)=>s+o.total,0);
    countEl.innerHTML = `📦 <strong>${orders.length}</strong> objednávek &nbsp;|&nbsp; 💰 Celkový obrat: <strong>${totalRevenue} Kč</strong>`;

    if (orders.length === 0) {
      listEl.innerHTML = `<div class="no-orders"><div class="no-orders-icon">📭</div>Žádné objednávky zatím</div>`;
      return;
    }
    listEl.innerHTML = orders.map(o=>`
      <div class="order-card">
        <div class="order-card-header">
          <div>
            <div class="order-student">👤 ${o.name}</div>
            <div class="order-meta">Třída: ${o.cls} &nbsp;·&nbsp; ⏰ ${o.time}</div>
          </div>
          <div class="order-time">${o.timestamp}</div>
        </div>
        <div class="order-items">
          ${o.items.map(i=>`<span class="order-item-tag">${i.name} ×${i.qty} (${i.price} Kč)</span>`).join('')}
        </div>
        <div class="order-total-row">
          <span>K zaplacení při vyzvednutí</span>
          <span class="order-total-amount">${o.total} Kč</span>
        </div>
      </div>
    `).join('');
  }

  // TOAST
  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(()=>t.classList.remove('show'), 2200);
  }

  // INIT
  renderProducts();
</script>

</body>
</html>

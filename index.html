<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bufet - Skolni svaciny</title>

<script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>

<style>
body{font-family:sans-serif;margin:0;background:#f9f9f9}
header{display:flex;justify-content:space-between;padding:1rem;background:#2d6a4f;color:#fff}
button{cursor:pointer}
.menu{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:1rem;padding:1rem}
.card{background:#fff;padding:1rem;border-radius:10px;border:1px solid #ddd}
.cart{position:fixed;right:0;top:0;background:#fff;width:300px;height:100%;border-left:1px solid #ccc;padding:1rem;overflow:auto}
.hidden{display:none}
</style>
</head>

<body>

<header>
<div>🥪 Bufet</div>
<button onclick="toggleCart()">Košík (<span id="count">0</span>)</button>
</header>

<div class="menu" id="menu"></div>

<div class="cart hidden" id="cartBox">
<h3>Košík</h3>
<div id="cartItems"></div>
<p><b>Celkem:</b> <span id="total">0</span> Kč</p>

<input id="name" placeholder="Jméno a třída" style="width:100%;margin-bottom:10px">

<button onclick="order()">Objednat</button>
</div>

<script>

var MENU = [
{id:1,name:"Svačina",price:20},
{id:2,name:"Velká svačina",price:50},
{id:3,name:"Šťáva",price:30}
];

var cart=[];

function renderMenu(){
let html="";
MENU.forEach(i=>{
html+=`
<div class="card">
<h3>${i.name}</h3>
<p>${i.price} Kč</p>
<button onclick="add(${i.id})">Přidat</button>
</div>
`;
});
document.getElementById("menu").innerHTML=html;
}

function add(id){
let item=MENU.find(x=>x.id===id);
let c=cart.find(x=>x.id===id);

if(c){c.qty++;}
else{cart.push({...item,qty:1});}

updateCart();
}

function updateCart(){
let html="";
let total=0,count=0;

cart.forEach(i=>{
total+=i.price*i.qty;
count+=i.qty;

html+=`
<div>
${i.name} x${i.qty}
<button onclick="change(${i.id},-1)">-</button>
<button onclick="change(${i.id},1)">+</button>
</div>
`;
});

document.getElementById("cartItems").innerHTML=html || "Prázdný";
document.getElementById("total").innerText=total;
document.getElementById("count").innerText=count;
}

function change(id,val){
let i=cart.find(x=>x.id===id);
i.qty+=val;
if(i.qty<=0) cart=cart.filter(x=>x.id!==id);
updateCart();
}

function toggleCart(){
document.getElementById("cartBox").classList.toggle("hidden");
}

function order(){
let name=document.getElementById("name").value.trim();

if(name.length<3){
alert("Zadej jméno");
return;
}

if(cart.length===0){
alert("Košík je prázdný");
return;
}

alert("Objednávka odeslána");

cart=[];
updateCart();
}

renderMenu();
updateCart();

</script>

</body>
</html>
